<div class="container">
  <section class="services-section">


    <!-- Lado Izquierdo: Información (Mismo ancho que el de servicios) -->
    <div class="service-content">
      <span class="agency-tag-accent">Let's Build Together</span>
      <h2 class="contact-main-heading">Llevemos tu marca al siguiente nivel</h2>
      <p class="contact-pitch">
        ¿Listo para transformar tu captación de clientes? Completa el formulario o escríbenos directamente. Diseñemos
        una estrategia a la medida de tu negocio.
      </p>
      <div class="minimal-channels">
        <p>ecaiainfo&#64;gmail.com</p>
     
      </div>
    </div>

    <!-- Lado Derecho: Formulario (Mismo ancho que el de servicios) -->
    <div class="service-illustration">
      <form (submit)="onSubmit($event)" *ngIf="!submitSuccess()" class="glass-form">

        <div class="form-field-wrapper">
          <input type="text" id="nombre" name="nombre" placeholder=" " [ngModel]="contactModel().nombre"
            (ngModelChange)="updateField('nombre', $event)" required>
          <label for="nombre">Nombre completo</label>
        </div>

        <div class="form-field-wrapper">
          <input type="email" id="email" name="email" placeholder=" " [ngModel]="contactModel().email"
            (ngModelChange)="updateField('email', $event)" required>
          <label for="email">Correo electrónico</label>
        </div>

        <div class="form-field-wrapper">
          <select id="servicio" name="servicio" [ngModel]="contactModel().servicio"
            (ngModelChange)="updateField('servicio', $event)">
            <option value="" disabled selected></option>
            <option value="marketing">Marketing Estratégico</option>
            <option value="tech">Tecnología & Automatización</option>
          </select>
          <label for="servicio" class="floating-label">¿Qué solución necesitas?</label>
        </div>

        <div class="form-field-wrapper">
          <textarea id="mensaje" name="mensaje" placeholder=" " [ngModel]="contactModel().mensaje"
            (ngModelChange)="updateField('mensaje', $event)" rows="4" required></textarea>
          <label for="mensaje">Cuéntanos sobre tu proyecto</label>
        </div>

        <button type="submit" class="btn-earth-submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Enviando...' : 'Iniciar Conversación' }}
        </button>
      </form>
    </div>

  </section>

</div>
